name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: List files
        run: ls -R

      - name: Grant execute permission for gradlew
        run: chmod +x TVLauncherNative/gradlew

      - name: Build APK
        run: cd TVLauncherNative && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TVLauncher-APK
          path: TVLauncherNative/app/build/outputs/apk/debug/*.apk
